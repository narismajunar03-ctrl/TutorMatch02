<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TutorMatch - Subjects</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/subject-list.css">

</head>

<body>

<div class="navbar">
  <a class="logo" href="#">TutorMatch</a>
  <div class="nav-links">
    <a href="#">Subjects</a>
    <a href="#">Tutors</a>
    <a href="#">About</a>
  </div>
</div>

<div class="header">
  <h1>List of Subjects</h1>
  <p>Find tutors by subject, learning mode, and price range</p>
</div>

<div class="filter-box">

  <input type="text" id="search" class="search-input" placeholder="Search subjects (e.g. Math, Python)">

  <div class="filter-row">

    <div class="checkbox-group">
      <label><input type="checkbox" value="online" class="mode"> Online</label>
      <label><input type="checkbox" value="f2f" class="mode"> Face-to-Face</label>
    </div>

    <div style="display:flex; align-items:center;">
      <div class="price-range">
        <input type="number" id="minPrice" placeholder="Min ₱">
        <span>-</span>
        <input type="number" id="maxPrice" placeholder="Max ₱">
      </div>
      <span class="clear-btn" onclick="clearFilters()">Clear</span>
    </div>

  </div>

</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
const data = [
  { name:"Mathematics", mode:"online", price:200, sessions:10, desc:"Algebra, geometry, and problem solving step-by-step." },
  { name:"English", mode:"f2f", price:180, sessions:8, desc:"Grammar, writing, and speaking improvement." },
  { name:"Programming", mode:"both", price:300, sessions:15, desc:"HTML, CSS, JavaScript, Python fundamentals." }
];

const grid = document.getElementById("grid");

function getModeLabel(mode){
  if(mode === "online") return "Online";
  if(mode === "f2f") return "Face-to-Face";
  return "Online & Face-to-Face";
}

function render(list){
  grid.innerHTML = list.map(item => `
    <div class="card">
      <div class="badge ${item.mode}">${getModeLabel(item.mode)}</div>
      <div class="subject">${item.name}</div>
      <div class="price">₱${item.price}/session</div>
      <div class="sessions">${item.sessions} sessions available</div>
      <div class="desc">${item.desc}</div>
      <a href="#" class="btn">View ${item.name} Tutors</a>
    </div>
  `).join("");
}

function filter(){
  const search = document.getElementById("search").value.toLowerCase();
  const min = parseInt(document.getElementById("minPrice").value) || 0;
  const max = parseInt(document.getElementById("maxPrice").value) || 999999;

  const modes = [...document.querySelectorAll(".mode:checked")].map(m => m.value);

  const result = data.filter(item => {
    const matchSearch = item.name.toLowerCase().includes(search);
    const matchPrice = item.price >= min && item.price <= max;
    const matchMode = modes.length ? (modes.includes(item.mode) || item.mode === "both") : true;

    return matchSearch && matchPrice && matchMode;
  });

  render(result);
}

function clearFilters(){
  document.getElementById("search").value = "";
  document.getElementById("minPrice").value = "";
  document.getElementById("maxPrice").value = "";
  document.querySelectorAll(".mode").forEach(cb => cb.checked = false);
  render(data);
}

document.querySelectorAll("input").forEach(el => {
  el.addEventListener("input", filter);
  el.addEventListener("change", filter);
});

render(data);
</script>

</body>
</html>
