<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            background: #f8fafc;
            color: #0f172a;
        }

        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 64px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: #4f46e5;
            text-decoration: none;
        }

        /* HEADER */
        .header {
            padding: 32px 64px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #4f46e5;
        }

        .header p {
            color: #64748b;
            margin-top: 6px;
        }

        /* LAYOUT */
        .container {
            padding: 32px 64px;
        }

        .grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
        }

        /* SIDEBAR */
        .sidebar {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .sidebar h3 {
            margin-bottom: 16px;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            color: #475569;
            margin-bottom: 6px;
        }

        .sidebar a:hover {
            background: #f1f5f9;
        }

        /* CARD */
        .card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* SEARCH */
        .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        /* TUTOR GRID */
        .tutor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .tutor-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            transition: 0.25s;
        }

        .tutor-card:hover {
            border-color: #4f46e5;
            background: #f0f4ff;
        }

        .tutor-name {
            font-weight: 700;
        }

        .tutor-price {
            color: #4f46e5;
            font-weight: 600;
            margin: 6px 0;
        }

        /* BUTTON */
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #4338ca;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
        }

        th {
            font-size: 13px;
            color: #64748b;
        }

        tr {
            border-bottom: 1px solid #f1f5f9;
        }

        /* STATUS */
        .status {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
        }

        .confirmed { background: #dcfce7; color: #15803d; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            top: 0;
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 16px;
            width: 400px;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .container, .navbar, .header {
                padding: 20px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/" class="logo">TutorMatch</a>
    <a href="/logout">Logout</a>
</div>

<div class="header">
    <h1>Student Dashboard</h1>
    <p>Find tutors, manage bookings, and track sessions</p>
</div>

<div class="container">
    <div class="grid">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h3>Menu</h3>
            <a href="#findTutor">Find Tutor</a>
            <a href="#bookings">Bookings</a>
            <a href="#sessions">Sessions</a>
        </aside>

        <!-- MAIN -->
        <main>

            <!-- FIND TUTOR -->
            <div id="findTutor" class="card">
                <h2>Find Tutor</h2>

                <div class="search-box">
                    <input type="text" placeholder="Search tutor...">
                </div>

                <div class="tutor-grid">
                    <div class="tutor-card" th:each="tutor : ${tutors}">
                        <div class="tutor-name" th:text="${tutor.name}">John</div>
                        <div th:text="${tutor.subject}">Math</div>
                        <div class="tutor-price">₱<span th:text="${tutor.rate}">200</span>/hr</div>
                        <button class="btn" onclick="openModal()">Book</button>
                    </div>
                </div>
            </div>

            <!-- BOOKINGS -->
            <div id="bookings" class="card">
                <h2>My Bookings</h2>

                <table>
                    <thead>
                    <tr>
                        <th>Tutor</th>
                        <th>Subject</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="b : ${bookings}">
                        <td th:text="${b.tutorName}">John</td>
                        <td th:text="${b.subject}">Math</td>
                        <td><span class="status confirmed" th:text="${b.status}">Confirmed</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- SESSIONS -->
            <div id="sessions" class="card">
                <h2>My Sessions</h2>

                <table>
                    <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Subject</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${sessions}">
                        <td th:text="${s.date}"></td>
                        <td th:text="${s.time}"></td>
                        <td th:text="${s.subject}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </main>

    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Book Session</h3>
        <input type="date">
        <input type="time">
        <button class="btn">Confirm</button>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById("modal").style.display = "block";
    }

    window.onclick = function(e) {
        if (e.target.classList.contains("modal")) {
            e.target.style.display = "none";
        }
    }
</script>

</body>
</html>
