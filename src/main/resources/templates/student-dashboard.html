<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
    }

    :root {
        --primary:#2563eb;
        --primary-dark:#1d4ed8;
        --accent:#eff6ff;
        --text:#0f172a;
        --muted:#64748b;
        --border:#e2e8f0;
        --surface:#ffffff;
        --background:#f8fafc;
        --shadow:0 10px 30px rgba(15,23,42,0.08);
        --radius:14px;
    }

    body {
        background:var(--background);
        color:var(--text);
    }

    /* NAVBAR */
    .navbar {
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:18px 40px;
        background:#fff;
        border-bottom:1px solid var(--border);
    }

    .logo {
        font-weight:800;
        color:var(--primary);
        text-decoration:none;
        font-size:18px;
    }

    /* LAYOUT */
    .dashboard-container {
        display:flex;
        min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar {
        width:240px;
        background:#fff;
        border-right:1px solid var(--border);
        padding:30px 20px;
    }

    .sidebar h3 {
        margin-bottom:20px;
        font-size:16px;
    }

    .sidebar a {
        display:block;
        padding:12px 14px;
        margin-bottom:8px;
        border-radius:10px;
        text-decoration:none;
        color:var(--muted);
        transition:0.2s;
    }

    .sidebar a:hover {
        background:var(--accent);
        color:var(--primary);
    }

    /* MAIN */
    .main-content {
        flex:1;
        padding:40px;
    }

    section {
        margin-bottom:40px;
    }

    h2 {
        margin-bottom:15px;
        font-size:20px;
    }

    /* CARD */
    .card {
        background:#fff;
        border:1px solid var(--border);
        border-radius:var(--radius);
        box-shadow:var(--shadow);
        padding:20px;
    }

    /* SEARCH */
    .search-box {
        margin-bottom:15px;
    }

    input {
        width:100%;
        padding:12px;
        border:1px solid var(--border);
        border-radius:10px;
        outline:none;
    }

    /* TABLE */
    table {
        width:100%;
        border-collapse:collapse;
    }

    th {
        text-align:left;
        font-size:13px;
        color:var(--muted);
        padding:12px;
        border-bottom:1px solid var(--border);
    }

    td {
        padding:14px 12px;
        border-bottom:1px solid var(--border);
        vertical-align:middle;
    }

    tr:hover td {
        background:#f9fbff;
    }

    /* BUTTON */
    .btn {
        background:var(--primary);
        color:#fff;
        border:none;
        padding:8px 14px;
        border-radius:8px;
        cursor:pointer;
        font-size:13px;
    }

    .btn:hover {
        background:var(--primary-dark);
    }

    /* STATUS */
    .status {
        padding:5px 10px;
        border-radius:20px;
        font-size:12px;
        font-weight:600;
    }

    .confirmed {
        background:#dcfce7;
        color:#166534;
    }

    .pending {
        background:#fff7ed;
        color:#c2410c;
    }

    /* RESPONSIVE */
    @media(max-width:900px){
        .dashboard-container {
            flex-direction:column;
        }

        .sidebar {
            width:100%;
            border-right:none;
            border-bottom:1px solid var(--border);
        }

        .main-content {
            padding:20px;
        }
    }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/" class="logo">TutorMatch</a>
    <a href="/logout">Logout</a>
</div>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Student Panel</h3>
        <a href="#findTutor">Find Tutor</a>
        <a href="#bookings">My Bookings</a>
        <a href="#sessions">My Sessions</a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- FIND TUTOR -->
        <section id="findTutor">
            <h2>Find Tutor</h2>

            <div class="card">
                <div class="search-box">
                    <input type="text" placeholder="Search tutor or subject...">
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Subject</th>
                            <th>Rate</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tutor : ${tutors}">
                            <td th:text="${tutor.name}">John Tutor</td>
                            <td th:text="${tutor.subject}">Math</td>
                            <td>₱<span th:text="${tutor.rate}">200</span>/hr</td>
                            <td>
                                <button class="btn">Book</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- BOOKINGS -->
        <section id="bookings">
            <h2>My Bookings</h2>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Tutor</th>
                            <th>Subject</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking : ${bookings}">
                            <td th:text="${booking.tutorName}">John Tutor</td>
                            <td th:text="${booking.subject}">Math</td>
                            <td>
                                <span class="status confirmed"
                                      th:text="${booking.status}">Confirmed</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- SESSIONS -->
        <section id="sessions">
            <h2>My Sessions</h2>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Subject</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="session : ${sessions}">
                            <td th:text="${session.date}">2026-01-01</td>
                            <td th:text="${session.time}">10:00 AM</td>
                            <td th:text="${session.subject}">Math</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>
</div>

</body>
</html>
