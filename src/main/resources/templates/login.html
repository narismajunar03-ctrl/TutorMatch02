<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorMatch - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>

<div class="login-wrapper">

    <form class="login-card" th:action="@{/user/login}" method="post">

        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue</p>
		<p th:if="${param.error}" style="color:red;">Invalid Username or Password</p>
        <div class="input-group">
            <input type="text" name="username" required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit">Sign In</button>
        <a href="/users/user-registration" class="signup-btn">Sign Up</a>

    </form>

</div>

<script>
    const params = new URLSearchParams(window.location.search);

    if (params.get("error") === "true") {
        document.getElementById("errorMsg").style.display = "block";
    }
</script>

<style>
    .signup-btn {
        display: block;
        margin: 16px auto 0 auto;
        padding: 10px 0;
        width: 100%;
        background: #f5f5f5;
        color: #333;
        border: none;
        border-radius: 4px;
        text-align: center;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
    }
    .signup-btn:hover {
        background: #e0e0e0;
    }
</style>

</body>
</html>
